apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spark-streaming-hpa
  namespace: ridesharing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spark-streaming
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gps-simulator-hpa
  namespace: ridesharing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gps-simulator
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
