global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gps_simulator'
    static_configs:
      - targets: ['172.18.0.1:8000']   # GPS simulator metrics (port 8000)

  - job_name: 'spark_streaming'
    static_configs:
      - targets: ['172.18.0.1:8001']   # Spark streaming metrics (port 8001)
